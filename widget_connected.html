<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteX Traders Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: light only;
    --accent-big:   #00e5a0;
    --accent-small: #ff4d6d;
    --accent-blue:  #4fc3f7;
    --widget-w: 265px;
  }

  html { color-scheme: light; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== PASSWORD GATE ===== */
  #password-gate {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    z-index: 9999;
  }

  .gate-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 36px 32px;
    width: 320px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    text-align: center;
  }

  .gate-logo-img {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 10px;
    display: block;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.15);
  }

  .gate-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700;
    color: #fff; letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .gate-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .gate-input-wrap { position: relative; margin-bottom: 16px; }

  .gate-input {
    width: 100%;
    padding: 12px 44px 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }

  .gate-input:focus  { border-color: rgba(79,195,247,0.6); }
  .gate-input::placeholder { color: rgba(255,255,255,0.3); }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: rgba(255,255,255,0.4);
    font-size: 16px; background: none; border: none;
  }

  .gate-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  .gate-btn:hover  { opacity: 0.88; }
  .gate-btn:active { transform: scale(0.97); }
  .gate-error { margin-top: 14px; font-size: 12px; color: #ff6b6b; min-height: 18px; }

  /* ===== FLOATING WIDGET WRAPPER ===== */
  #floating-widget {
    position: fixed;
    top: 80px; right: 20px;
    width: var(--widget-w);
    z-index: 9000; display: none;
    touch-action: none;
  }

  /* Outside top-right buttons */
  .widget-outer-btns {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 6px;
    padding-right: 2px;
  }

  .outer-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .outer-btn:hover  { transform: scale(1.12); opacity: 0.9; }
  .outer-btn:active { transform: scale(0.95); }

  .outer-btn-hide {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
  }

  .outer-btn-exit {
    background: rgba(255,77,109,0.25);
    border: 1px solid rgba(255,77,109,0.45);
  }

  .widget-card {
    background: rgba(15,12,41,0.78);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px; overflow: hidden;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 1px 0 rgba(255,255,255,0.15) inset;
    animation: widgetIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    cursor: grab;
  }

  .widget-card:active { cursor: grabbing; }

  @keyframes widgetIn {
    from { opacity: 0; transform: scale(0.8) translateY(-10px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }

  /* Header */
  .widget-header {
    padding: 10px 14px 8px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
  }

  .header-logo {
    width: 34px; height: 34px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .widget-brand { display: flex; flex-direction: column; gap: 1px; flex: 1; }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #fff; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
  }

  .brand-link a {
    font-size: 9.5px; color: var(--accent-blue);
    text-decoration: none; letter-spacing: 0.5px; opacity: 0.8;
    transition: opacity 0.2s;
  }

  .brand-link a:hover { opacity: 1; text-decoration: underline; }

  /* Body */
  .widget-body { padding: 12px 14px; }

  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }

  .mode-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--accent-blue);
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 20px;
    padding: 2px 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .time-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.5); letter-spacing: 0.5px;
  }

  .prediction-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px;
    text-align: center; margin-bottom: 10px;
    position: relative; overflow: hidden;
  }

  .prediction-block::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,195,247,0.07), transparent 70%);
    pointer-events: none;
  }

  .period-label {
    font-size: 9px; color: rgba(255,255,255,0.3);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px;
  }

  .period-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.45); letter-spacing: 0.5px; margin-bottom: 10px;
  }

  .predict-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: 3px; line-height: 1;
    transition: all 0.3s ease;
  }

  .predict-label.BIG   { color: var(--accent-big);   text-shadow: 0 0 22px rgba(0,229,160,0.55); }
  .predict-label.SMALL { color: var(--accent-small); text-shadow: 0 0 22px rgba(255,77,109,0.55); }
  .predict-label.WAIT  { color: rgba(255,255,255,0.28); text-shadow: none; font-size: 22px; }

  .logic-text {
    font-size: 9px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px; margin-top: 6px;
  }

  .countdown-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 10px;
  }

  .countdown-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-blue);
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.65); }
  }

  .countdown-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--accent-blue); letter-spacing: 1px; min-width: 30px; text-align: center;
  }

  .countdown-unit {
    font-size: 9px; color: rgba(255,255,255,0.28);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .meta-row {
    display: flex; gap: 6px; margin-bottom: 8px;
  }

  .meta-chip {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 5px 4px;
  }

  .meta-chip-label {
    font-size: 8px; color: rgba(255,255,255,0.28);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .meta-chip-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 700; color: #fff; line-height: 1.2;
  }

  .winrate-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 8px 12px;
  }

  .winrate-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }

  .winrate-label {
    font-size: 8px; color: rgba(255,255,255,0.28);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  .winrate-score { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; }
  .winrate-score span.good  { color: var(--accent-big); }
  .winrate-score span.mid   { color: #ffd54f; }
  .winrate-score span.bad   { color: var(--accent-small); }
  .winrate-score span.t     { color: rgba(255,255,255,0.4); }

  .winrate-bar-bg {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px; overflow: hidden;
  }

  .winrate-bar-fill {
    height: 100%; border-radius: 10px;
    transition: width 0.6s ease, background 0.4s ease;
    width: 0%; background: var(--accent-big);
  }

  .winrate-bar-fill.mid { background: #ffd54f; }
  .winrate-bar-fill.bad { background: var(--accent-small); }

  .winrate-detail {
    display: flex; justify-content: space-between; margin-top: 5px;
  }

  .wd-item { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
  .wd-item span { font-weight: 700; }
  .wd-item span.w { color: var(--accent-big); }
  .wd-item span.l { color: var(--accent-small); }
  .wd-item span.t { color: rgba(255,255,255,0.5); }

  .status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: 8px;
  }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent-big);
    animation: blink 2s ease-in-out infinite; flex-shrink: 0;
  }

  .status-dot.offline { background: #ff4d6d; animation: none; }
  .status-text { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.4px; }

  /* ===== MINI PILL ===== */
  #mini-pill {
    position: fixed; top: 80px; right: 20px;
    z-index: 9000; display: none;
    cursor: grab; touch-action: none;
  }

  #mini-pill:active { cursor: grabbing; }

  .pill-inner {
    background: rgba(15,12,41,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 8px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45);
    cursor: pointer; transition: transform 0.15s;
  }

  .pill-inner:hover { transform: scale(1.03); }

  .pill-logo {
    width: 26px; height: 26px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .pill-info { display: flex; flex-direction: column; gap: 2px; }

  .pill-brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.85); letter-spacing: 1px;
  }

  .pill-period {
    font-family: 'Rajdhani', sans-serif;
    font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px;
  }

  .pill-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
    margin-left: auto;
  }

  .pill-label.BIG   { color: var(--accent-big); }
  .pill-label.SMALL { color: var(--accent-small); }
  .pill-label.WAIT  { color: rgba(255,255,255,0.4); font-size: 12px; }

  /* ===== ADMIN PANEL ===== */
  #admin-panel {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    z-index: 9990;
  }

  .admin-card {
    background: rgba(15,12,41,0.92);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 32px; width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.65);
  }

  .admin-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700; color: #fff;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 24px; text-align: center;
  }

  .admin-field { margin-bottom: 16px; }

  .admin-field label {
    display: block; font-size: 10px;
    color: rgba(255,255,255,0.4); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 6px;
  }

  .admin-input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff;
    font-family: 'Exo 2', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }

  .admin-input:focus { border-color: rgba(79,195,247,0.5); }
  .admin-input::placeholder { color: rgba(255,255,255,0.2); }

  .admin-row { display: flex; gap: 10px; margin-top: 6px; }

  .admin-save {
    flex: 1; padding: 11px;
    background: linear-gradient(135deg, #00c389, #00e5a0);
    border: none; border-radius: 10px; color: #0f1e15;
    font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
    transition: opacity 0.2s;
  }

  .admin-save:hover { opacity: 0.88; }

  .admin-close {
    padding: 11px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: rgba(255,255,255,0.6);
    font-family: 'Exo 2', sans-serif; font-size: 13px;
    cursor: pointer; text-transform: uppercase; transition: background 0.2s;
  }

  .admin-close:hover { background: rgba(255,255,255,0.12); }
  .admin-msg { margin-top: 12px; font-size: 12px; color: var(--accent-big); min-height: 18px; text-align: center; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,12,41,0.92);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 40px; padding: 10px 22px;
    font-size: 13px; color: #fff; letter-spacing: 0.5px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    z-index: 99999; pointer-events: none; white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    :root { --widget-w: 240px; }
    .gate-card  { width: 290px; padding: 28px 22px; }
    .admin-card { width: 300px; padding: 24px; }
  }
</style>
</head>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-card">
    <div class="admin-title">Admin Settings</div>
    <div class="admin-field">
      <label>Current Password (verify)</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-current-pw"
               placeholder="Enter current password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-current-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>
    <div class="admin-field">
      <label>New Password</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-new-pw"
               placeholder="Enter new password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-new-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>
    <div class="admin-field">
      <label>Confirm New Password</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-confirm-pw"
               placeholder="Confirm new password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-confirm-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>
    <div class="admin-row">
      <button class="admin-save"  onclick="saveAdminSettings()">Save</button>
      <button class="admin-close" onclick="closeAdmin()">Cancel</button>
    </div>
    <div class="admin-msg" id="admin-msg"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const CFG = {
    STORAGE_KEY:      'ht_widget_pw',
    DEFAULT_PASSWORD: 'S@m1n*^-~',
    API_PORT:         5055,
    POLL_MS:          4000,
    WIN_HISTORY_KEY:  'ht_win_history',
    MAX_HISTORY:      20,
  };

  const API_URL = `http://localhost:${CFG.API_PORT}/api/prediction`;

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(CFG.WIN_HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(arr) {
    localStorage.setItem(CFG.WIN_HISTORY_KEY, JSON.stringify(arr));
  }

  function recordResult(result) {
    const h = getHistory();
    h.unshift(result);
    if (h.length > CFG.MAX_HISTORY) h.length = CFG.MAX_HISTORY;
    saveHistory(h);
    renderWinRate();
  }

  function renderWinRate() {
    const h      = getHistory();
    const total  = h.length;
    const wins   = h.filter(r => r === 'WIN').length;
    const losses = total - wins;
    const pct    = total > 0 ? Math.round((wins / total) * 100) : 0;
    document.getElementById('wr-wins').textContent   = wins;
    document.getElementById('wr-losses').textContent = losses;
    document.getElementById('wr-pct').textContent    = pct + '%';
    const cls = pct >= 60 ? 'good' : pct >= 40 ? 'mid' : 'bad';
    document.getElementById('winrate-score').innerHTML =
      `<span class="${cls}">${wins}/${total}</span>`;
    const bar = document.getElementById('winrate-bar');
    bar.style.width = pct + '%';
    bar.className   = 'winrate-bar-fill' + (pct >= 60 ? '' : pct >= 40 ? ' mid' : ' bad');
  }

  const getPW = ()   => localStorage.getItem(CFG.STORAGE_KEY) || CFG.DEFAULT_PASSWORD;
  const setPW = (pw) => localStorage.setItem(CFG.STORAGE_KEY, pw);

  function checkPassword() {
    const val   = document.getElementById('gate-pw-input').value.trim();
    const errEl = document.getElementById('gate-error');
    if (val === getPW()) {
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('floating-widget').style.display = 'block';
      startClock(); startPolling(); renderWinRate();
      errEl.textContent = '';
    } else {
      errEl.textContent = 'Incorrect password. Please try again.';
      document.getElementById('gate-pw-input').value = '';
      document.getElementById('gate-pw-input').focus();
      document.getElementById('gate-pw-input').style.borderColor = 'rgba(255,77,109,0.7)';
      setTimeout(() => { document.getElementById('gate-pw-input').style.borderColor = ''; }, 1200);
    }
  }

  document.getElementById('gate-pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function togglePwVis(id, btn) {
    const el = document.getElementById(id);
    if (el.type === 'password') { el.type = 'text';     btn.innerHTML = '&#9679;'; }
    else                        { el.type = 'password'; btn.innerHTML = '&#9673;'; }
  }

  let _clicks = 0, _ct = null;
  document.getElementById('brand-name-click').addEventListener('click', () => {
    _clicks++;
    if (_clicks === 3) { openAdmin(); _clicks = 0; clearTimeout(_ct); return; }
    clearTimeout(_ct);
    _ct = setTimeout(() => { _clicks = 0; }, 600);
  });

  function openAdmin() {
    document.getElementById('admin-panel').style.display = 'flex';
    document.getElementById('admin-msg').textContent = '';
    ['admin-current-pw','admin-new-pw','admin-confirm-pw'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
  }

  function saveAdminSettings() {
    const cur  = document.getElementById('admin-current-pw').value;
    const nw   = document.getElementById('admin-new-pw').value.trim();
    const conf = document.getElementById('admin-confirm-pw').value.trim();
    const msg  = document.getElementById('admin-msg');
    if (cur !== getPW())  { msg.style.color='#ff6b6b'; msg.textContent='Current password is incorrect.';     return; }
    if (nw.length < 4)    { msg.style.color='#ff6b6b'; msg.textContent='Password must be at least 4 chars.'; return; }
    if (nw !== conf)      { msg.style.color='#ff6b6b'; msg.textContent='Passwords do not match.';            return; }
    setPW(nw);
    msg.style.color = '#00e5a0';
    msg.textContent = 'Password updated successfully.';
    setTimeout(closeAdmin, 1400);
  }

  function minimizeWidget() {
    const fw   = document.getElementById('floating-widget');
    const pill = document.getElementById('mini-pill');
    pill.style.top   = fw.style.top  || '80px';
    pill.style.left  = fw.style.left || 'auto';
    pill.style.right = fw.style.left ? 'auto' : '20px';
    fw.style.display   = 'none';
    pill.style.display = 'block';
  }

  function restoreWidget() {
    document.getElementById('mini-pill').style.display       = 'none';
    document.getElementById('floating-widget').style.display = 'block';
  }

  function exitWidget() {
    document.getElementById('floating-widget').style.display = 'none';
    document.getElementById('mini-pill').style.display       = 'none';
    showToast('Widget closed. Refresh page to reopen.');
  }

  function makeDraggable(el) {
    let ox, oy, active = false;
    const onStart = (cx, cy) => {
      const r = el.getBoundingClientRect();
      ox = cx - r.left; oy = cy - r.top;
      active = true; el.style.transition = 'none'; el.style.right = 'auto';
    };
    const onMove = (cx, cy) => {
      if (!active) return;
      const maxX = window.innerWidth  - el.offsetWidth;
      const maxY = window.innerHeight - el.offsetHeight;
      el.style.left = Math.max(0, Math.min(maxX, cx - ox)) + 'px';
      el.style.top  = Math.max(0, Math.min(maxY, cy - oy)) + 'px';
    };
    const onEnd = () => { active = false; };
    el.addEventListener('mousedown',  e => { if (e.button===0) onStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   onEnd);
    el.addEventListener('touchstart',  e => { const t=e.touches[0]; onStart(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchmove', e => { const t=e.touches[0]; onMove(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchend',  onEnd);
  }

  makeDraggable(document.getElementById('floating-widget'));
  makeDraggable(document.getElementById('mini-pill'));

  function startClock() {
    const tick = () => {
      const d = new Date();
      let h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
      const ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('live-time').textContent =
        `${p2(h)}:${p2(m)}:${p2(s)} ${ap}`;
    };
    tick(); setInterval(tick, 1000);
  }

  const p2 = n => String(n).padStart(2, '0');

  let _lastPeriod = null;

  function updateWidget(d) {
    const pred = (d.prediction || 'WAIT').toUpperCase();
    const predEl = document.getElementById('predict-label');
    predEl.textContent = pred;
    predEl.className   = 'predict-label ' + pred;
    document.getElementById('period-number').textContent = d.period || '—';
    document.getElementById('logic-text').textContent    = d.logic  || '';
    if (typeof d.countdown === 'number') {
      document.getElementById('countdown-val').textContent = d.countdown;
    }
    document.getElementById('step-val').textContent   = d.step        ?? '1';
    document.getElementById('streak-val').textContent = d.loss_streak ?? '0';
    document.getElementById('mode-badge').textContent = d.mode || 'WinGO 30sec';
    if (d.win_result && d.period !== _lastPeriod) {
      _lastPeriod = d.period;
      if (d.win_result === 'WIN' || d.win_result === 'LOSS') {
        recordResult(d.win_result);
      }
    }
    const pillEl = document.getElementById('pill-label');
    pillEl.textContent = pred === 'WAIT' ? '--' : pred;
    pillEl.className   = 'pill-label ' + pred;
    const lastDigits = (d.period || '------').slice(-6);
    document.getElementById('pill-period').textContent = 'P: ' + lastDigits;
  }

  function setStatus(online, msg) {
    document.getElementById('status-dot').className    = 'status-dot' + (online ? '' : ' offline');
    document.getElementById('status-text').textContent = msg;
  }

  async function fetchData() {
    try {
      const res  = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      updateWidget(data);
      setStatus(true, 'Live — connected to afnans_bot.');
    } catch {
      setStatus(false, 'Backend offline — connecting to afnans_bot..');
    }
  }

  function startPolling() {
    fetchData();
    setInterval(fetchData, CFG.POLL_MS);
  }

  function showToast(msg, ms = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  document.documentElement.style.colorScheme = 'light';
</script>
</body>
</html>
